<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="800" viewBox="0 0 2000 800">
  <defs>
    <pattern id="paper" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#eee9dc"/>
      <circle cx="4" cy="5" r="0.8" fill="#171a17" opacity="0.12"/>
      <circle cx="19" cy="23" r="0.65" fill="#171a17" opacity="0.1"/>
      <path d="M0 16H32" stroke="#ffffff" stroke-opacity="0.2"/>
    </pattern>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.7" fill="#0b5c44"/>
    </pattern>
    <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="8" result="noise"/>
      <feComposite in="noise" in2="SourceGraphic" operator="in" result="texture"/>
      <feBlend in="SourceGraphic" in2="texture" mode="multiply"/>
    </filter>
  </defs>

  <rect width="2000" height="800" fill="url(#paper)"/>
  <rect x="0" y="0" width="34" height="800" fill="#0b5c44"/>
  <rect x="84" y="66" width="1832" height="2" fill="#171a17"/>

  <g font-family="Arial, Helvetica, sans-serif" fill="#171a17">
    <text x="92" y="124" font-size="24" font-weight="700" letter-spacing="4">OPENAPI / AGENT TEAMS / CONTRACT REVIEW</text>
    <text x="92" y="250" font-size="92" font-weight="900" letter-spacing="-5">AI CODING AGENTS</text>
    <text x="92" y="350" font-size="92" font-weight="900" letter-spacing="-5">MAKE OPENAPI DRIFT</text>
    <text x="92" y="450" font-size="92" font-weight="900" letter-spacing="-5" fill="#0b5c44">MORE EXPENSIVE.</text>
    <text x="96" y="515" font-size="29" font-weight="600" letter-spacing="0.4">Three correct pull requests can still create one broken contract.</text>
  </g>

  <g transform="translate(1320 118)">
    <rect x="0" y="0" width="550" height="510" fill="#171a17"/>
    <rect x="28" y="28" width="494" height="454" fill="#f4f0e5"/>
    <rect x="57" y="60" width="438" height="96" fill="#0b5c44"/>
    <text x="79" y="101" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#f4f0e5" letter-spacing="2">CONTRACT IMPACT</text>
    <text x="79" y="135" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" fill="#f4f0e5">BREAKING CHANGE</text>

    <g font-family="monospace" font-size="22" font-weight="700">
      <text x="61" y="210" fill="#171a17">GET /invoices/{id}</text>
      <text x="61" y="266" fill="#9a2e26">− dueDate</text>
      <text x="61" y="314" fill="#0b5c44">+ paymentDueAt</text>
    </g>

    <rect x="57" y="350" width="438" height="3" fill="#171a17"/>
    <text x="61" y="400" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#171a17">2 CLIENTS AFFECTED</text>
    <text x="61" y="438" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0b5c44">HUMAN DECISION REQUIRED</text>
  </g>

  <path d="M1238 126L1280 126L1280 628L1238 628Z" fill="url(#dots)" opacity="0.72"/>
  <rect x="92" y="650" width="1778" height="2" fill="#171a17"/>

  <g font-family="Arial, Helvetica, sans-serif" fill="#171a17">
    <text x="92" y="716" font-size="25" font-weight="700" letter-spacing="1.5">@milonspace</text>
    <text x="1870" y="724" text-anchor="end" font-family="Segoe Script, cursive" font-size="39" font-style="italic">milon</text>
  </g>

  <circle cx="1871" cy="104" r="24" fill="#0b5c44"/>
  <circle cx="1871" cy="104" r="8" fill="#eee9dc"/>
  <g opacity="0.1" filter="url(#rough)">
    <rect x="0" y="0" width="2000" height="800" fill="#171a17"/>
  </g>
</svg>
