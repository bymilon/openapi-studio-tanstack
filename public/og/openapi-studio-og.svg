    <tspan x="64" dy="60">made reviewable.</tspan>
  </text>
  <text class="sans" x="68" y="350" fill="#171310" font-size="19" font-weight="480">
    <tspan x="68" dy="0">A clearer path from OpenAPI contract change</tspan>
    <tspan x="68" dy="31">to consequence and team decision.</tspan>
  </text>

  <g transform="translate(68 455)">
