<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAPI Studio</title>
  <desc id="desc">Contract changes, made reviewable. Public demand-validation build.</desc>
  <defs>
    <style>
      @font-face { font-family: Martian; src: url('../fonts/MartianGrotesk.woff2') format('woff2'); font-weight: 100 1000; }
      .sans { font-family: Martian, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#f5f5f3"/>
  <rect y="620" width="1200" height="10" fill="#cf2f1b"/>

  <g transform="translate(64 54)" fill="none" stroke="#cf2f1b" stroke-width="3">
    <path d="M0 0h18l8 11-8 11H0l8-11L0 0Z"/>
    <path d="M52 18H34l-8 11 8 11h18L44 29l8-11Z"/>
  </g>
  <text class="sans" x="130" y="82" fill="#171310" font-size="20" font-weight="760">OpenAPI Studio</text>
