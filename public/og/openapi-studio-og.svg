    <line x1="0" y1="82" x2="488" y2="82" stroke="#38332f"/>
    <rect x="28" y="105" width="42" height="28" fill="#ffffff"/>
    <text class="mono" x="49" y="124" fill="#171310" font-size="12" font-weight="700" text-anchor="middle">GET</text>
    <text class="mono" x="86" y="124" fill="#ffffff" font-size="13">/invoices/{invoiceId}</text>
    <line x1="0" y1="154" x2="488" y2="154" stroke="#38332f"/>
    <text class="mono" x="30" y="183" fill="#98918b" font-size="12">42</text>
    <text class="mono" x="78" y="183" fill="#ffffff" font-size="12">required:</text>
    <rect y="198" width="488" height="38" fill="#39201d"/>
    <text class="mono" x="28" y="222" fill="#ff8d7a" font-size="12">43 −    − dueDate</text>
    <rect y="236" width="488" height="38" fill="#173126"/>
    <text class="mono" x="28" y="260" fill="#a4e1bc" font-size="12">43 +    − paymentDueAt</text>
    <rect x="28" y="296" width="432" height="60" fill="#ff654b"/>
    <circle cx="58" cy="326" r="13" fill="none" stroke="#171310" stroke-width="2"/>
    <text class="sans" x="58" y="331" fill="#171310" font-size="16" font-weight="900" text-anchor="middle">!</text>
    <text class="sans" x="84" y="319" fill="#171310" font-size="11" font-weight="800">BREAKING CHANGE</text>
    <text class="sans" x="84" y="340" fill="#171310" font-size="14" font-weight="700">Required response field removed</text>
